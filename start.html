<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MGR START</title><style>
body{margin:0;font-family:Segoe UI,Arial;background:linear-gradient(135deg,#102f52,#0b2541);color:#fff}.c{width:min(950px,92%);margin:auto}.grid{display:grid;grid-template-columns:1fr .9fr;gap:35px;align-items:center;min-height:100vh}.card{background:#fff;color:#243447;padding:26px;border-radius:20px}input{width:100%;padding:13px;margin:7px 0;border:1px solid #dfe6ee;border-radius:10px}.btn{width:100%;padding:13px;border:0;border-radius:10px;background:#102f52;color:#fff;font-weight:700}.ok{display:none;background:#e9f6f0;color:#176a4d;padding:14px;border-radius:10px;margin-top:14px}@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body>
<div class="c grid"><div><h1>Organize seu dinheiro e enxergue para onde ele está indo.</h1><p>Controle receitas, despesas e orçamento mensal.</p><p><a href="index.html" style="color:white">Voltar</a></p></div><div class="card"><h2>Receba seu acesso</h2><form id="f"><input id="nome" placeholder="Nome" required><input id="whatsapp" placeholder="WhatsApp" required><input id="email" type="email" placeholder="E-mail" required><button class="btn">Quero testar gratuitamente</button></form><div id="ok" class="ok">Cadastro realizado. <a href="app.html">Acessar o MGR START</a></div></div></div>
<script>document.getElementById("f").onsubmit=function(e){e.preventDefault();const l=JSON.parse(localStorage.getItem("mgr_leads")||"[]");l.push({nome:nome.value,whatsapp:whatsapp.value,email:email.value});localStorage.setItem("mgr_leads",JSON.stringify(l));this.reset();ok.style.display="block";}</script>
</body></html>
